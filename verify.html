<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Подтверждение — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .code-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .code-content {
      width: 100%;
      max-width: 380px;
      text-align: center;
      animation: fadeSlideUp 0.6s ease-out;
    }

    .code-title h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .code-subtitle {
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
    }

    .code-inputs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .code-digit {
      width: 48px;
      height: 58px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      text-align: center;
      font-size: 24px;
      color: #FFFFFF;
      outline: none;
      transition: all 0.2s ease;
    }

    .code-digit:focus {
      border-color: #5B7CFF;
      box-shadow: 0 0 0 3px rgba(91, 124, 255, 0.2);
      transform: scale(1.02);
    }

    .btn-confirm {
      width: 100%;
      height: 54px;
      background: linear-gradient(90deg, #5B7CFF 0%, #7FA1FF 100%);
      border: none;
      border-radius: 16px;
      color: #FFFFFF;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(91, 124, 255, 0.4);
      transition: all 0.2s ease;
    }

    .btn-confirm:active {
      transform: scale(0.96);
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 24px;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .resend {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    .resend a {
      color: #7FA1FF;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="back-button" onclick="history.back()">←</div>

  <div class="code-container">
    <div class="code-content">
      <div class="code-title">
        <h2>Введите код</h2>
      </div>
      <div class="code-subtitle">
        Код отправлен на <span id="phoneDisplay">+7 (999) 123-45-67</span>
      </div>
      <div class="code-inputs" id="codeInputs">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric">
      </div>
      <button class="btn-confirm" id="confirmBtn">Подтвердить</button>
      <div class="resend">
        Не пришел код? <a href="#" id="resendBtn">Отправить снова</a>
      </div>
    </div>
  </div>

  <script>
    // Отображаем номер телефона
    const phone = localStorage.getItem('tempPhone') || '+7 (999) 123-45-67';
    document.getElementById('phoneDisplay').textContent = phone;

    // Настройка полей кода
    const inputs = document.querySelectorAll('.code-digit');
    
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });
      
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value === '' && index > 0) {
          inputs[index - 1].focus();
        }
      });
      
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        const digits = pasted.replace(/\D/g, '').split('');
        
        for (let i = 0; i < Math.min(digits.length, inputs.length); i++) {
          inputs[i].value = digits[i];
        }
        
        if (digits.length < inputs.length) {
          inputs[digits.length].focus();
        } else {
          inputs[inputs.length - 1].focus();
        }
      });
    });

    document.getElementById('confirmBtn').addEventListener('click', () => {
      const allFilled = Array.from(inputs).every(inp => inp.value.length === 1);
      if (allFilled) {
        localStorage.setItem('isLoggedIn', 'true');
        
        // Если нет данных пользователя, создаем временные
        if (!localStorage.getItem('userData')) {
          const userData = {
            name: 'Пользователь',
            phone: phone,
            avatar: '👤'
          };
          localStorage.setItem('userData', JSON.stringify(userData));
        }
        
        window.location.href = 'chats.html';
      } else {
        alert('Введите все 6 цифр кода');
      }
    });

    document.getElementById('resendBtn').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Код отправлен повторно');
    });
  </script>
</body>
</html>
