<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Профиль — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    .back-button {
      position: sticky;
      top: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 24px;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      position: relative;
    }

    .avatar-container {
      position: relative;
      margin-bottom: 16px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5B7CFF, #7FA1FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .edit-main-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: rgba(91, 124, 255, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
    }

    .edit-main-btn:active {
      transform: scale(0.92);
    }

    .profile-name {
      font-size: 28px;
      font-weight: 600;
      color: white;
      text-align: center;
      margin-bottom: 8px;
    }

    .profile-phone {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      margin-bottom: 12px;
    }

    .profile-bio {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      max-width: 90%;
      margin: 0 auto;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .settings-list {
      margin-top: 8px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      margin-bottom: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .settings-item:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.08);
    }

    .settings-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logout-btn {
      width: 100%;
      padding: 16px;
      background: rgba(255, 100, 100, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.3);
      border-radius: 16px;
      text-align: center;
      color: #ff6b6b;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s ease;
    }

    .logout-btn:active {
      transform: scale(0.98);
      background: rgba(255, 100, 100, 0.3);
    }

    /* Модальное окно редактирования */
    .edit-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .edit-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .edit-modal-content {
      width: 85%;
      max-width: 340px;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .edit-modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .edit-modal-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
    }

    .edit-modal-input:focus {
      border-color: #5B7CFF;
      box-shadow: 0 0 0 3px rgba(91, 124, 255, 0.2);
    }

    .edit-modal-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      resize: vertical;
      font-family: inherit;
      min-height: 80px;
    }

    .edit-modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .edit-modal-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .edit-modal-btn-primary {
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
      color: white;
    }

    .edit-modal-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    .edit-modal-btn:active {
      transform: scale(0.96);
    }

    .file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="back-button" onclick="window.location.href='chats.html'">←</div>

    <div class="profile-header">
      <div class="avatar-container">
        <div class="avatar" id="profileAvatar">
          <span id="avatarEmoji">👤</span>
        </div>
        <div class="edit-main-btn" id="editAvatarBtn">✎</div>
      </div>
      <div class="profile-name" id="profileName">Загрузка...</div>
      <div class="profile-phone" id="profilePhone"></div>
      <div class="profile-bio" id="profileBio"></div>
    </div>

    <div class="info-card">
      <div class="settings-list">
        <div class="settings-item" id="privacySettings">
          <div class="settings-icon">🔒</div>
          <div><div>Конфиденциальность</div><div style="font-size:12px;color:rgba(255,255,255,0.5);">Управление данными</div></div>
        </div>
        <div class="settings-item" id="devicesSettings">
          <div class="settings-icon">📱</div>
          <div><div>Устройства</div><div style="font-size:12px;color:rgba(255,255,255,0.5);">Активные сессии</div></div>
        </div>
        <div class="settings-item" id="themeSettings">
          <div class="settings-icon">🎨</div>
          <div><div>Оформление</div><div style="font-size:12px;color:rgba(255,255,255,0.5);">Тема и внешний вид</div></div>
        </div>
      </div>
    </div>

    <div class="logout-btn" id="logoutBtn">Выйти из аккаунта</div>
  </div>

  <!-- Модальное окно редактирования -->
  <div id="editModal" class="edit-modal">
    <div class="edit-modal-content">
      <div class="edit-modal-title">Редактировать профиль</div>
      <input type="text" class="edit-modal-input" id="editNameInput" placeholder="Имя">
      <input type="tel" class="edit-modal-input" id="editPhoneInput" placeholder="Телефон">
      <textarea class="edit-modal-textarea" id="editBioInput" placeholder="О себе" rows="3"></textarea>
      <div class="edit-modal-buttons">
        <button class="edit-modal-btn edit-modal-btn-secondary" id="cancelEditBtn">Отмена</button>
        <button class="edit-modal-btn edit-modal-btn-primary" id="saveEditBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <input type="file" id="avatarFileInput" accept="image/*" style="display:none">

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = 'login.html';
    }

    let profileName = localStorage.getItem('profileName') || 'Алексей Смирнов';
    let profilePhone = localStorage.getItem('profilePhone') || '+7 (999) 123-45-67';
    let profileBio = localStorage.getItem('profileBio') || 'Дизайнер интерфейсов. Люблю минимализм.';
    let profileAvatar = localStorage.getItem('profileAvatar') || '👤';

    function updateUI() {
      document.getElementById('profileName').textContent = profileName;
      document.getElementById('profilePhone').textContent = profilePhone;
      document.getElementById('profileBio').textContent = profileBio;
      
      const avatarEl = document.getElementById('avatarEmoji');
      if (profileAvatar && profileAvatar.startsWith('data:image')) {
        avatarEl.innerHTML = `<img src="${profileAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        avatarEl.style.fontSize = '0';
      } else {
        avatarEl.innerHTML = profileAvatar || '👤';
        avatarEl.style.fontSize = '48px';
      }
    }

    // Модальное окно редактирования
    const editModal = document.getElementById('editModal');
    
    document.getElementById('editAvatarBtn').addEventListener('click', () => {
      document.getElementById('editNameInput').value = profileName;
      document.getElementById('editPhoneInput').value = profilePhone;
      document.getElementById('editBioInput').value = profileBio;
      editModal.classList.add('active');
    });
    
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      editModal.classList.remove('active');
    });
    
    document.getElementById('saveEditBtn').addEventListener('click', () => {
      const newName = document.getElementById('editNameInput').value.trim();
      const newPhone = document.getElementById('editPhoneInput').value.trim();
      const newBio = document.getElementById('editBioInput').value.trim();
      
      if (newName) profileName = newName;
      if (newPhone) profilePhone = newPhone;
      if (newBio) profileBio = newBio;
      
      localStorage.setItem('profileName', profileName);
      localStorage.setItem('profilePhone', profilePhone);
      localStorage.setItem('profileBio', profileBio);
      updateUI();
      editModal.classList.remove('active');
    });

    // Смена аватара
    function changeProfileAvatar() {
      const avatarInput = document.getElementById('avatarFileInput');
      avatarInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            profileAvatar = event.target.result;
            localStorage.setItem('profileAvatar', profileAvatar);
            updateUI();
          };
          reader.readAsDataURL(file);
        }
      };
      avatarInput.click();
    }
    
    document.getElementById('profileAvatar')?.addEventListener('click', changeProfileAvatar);

    // Настройки (демо)
    document.getElementById('privacySettings').addEventListener('click', () => alert('Настройки конфиденциальности (демо)'));
    document.getElementById('devicesSettings').addEventListener('click', () => alert('Управление устройствами (демо)'));
    document.getElementById('themeSettings').addEventListener('click', () => alert('Настройки оформления (демо)'));
    
    // Выход
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('isLoggedIn');
      window.location.href = 'login.html';
    });
    
    updateUI();
  </script>
</body>
</html>
