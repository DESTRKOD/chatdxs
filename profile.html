<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Профиль — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    .back-button {
      position: sticky;
      top: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 24px;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .avatar-section {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5B7CFF, #7FA1FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar:active {
      transform: scale(0.96);
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }

    .info-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .info-value {
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .edit-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .edit-btn:active {
      transform: scale(0.92);
    }

    .settings-list {
      margin-top: 8px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .settings-item:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.08);
    }

    .settings-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logout-btn {
      width: 100%;
      padding: 16px;
      background: rgba(255, 100, 100, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.3);
      border-radius: 16px;
      text-align: center;
      color: #ff6b6b;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s ease;
    }

    .logout-btn:active {
      transform: scale(0.98);
      background: rgba(255, 100, 100, 0.3);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      width: 85%;
      max-width: 340px;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
    }

    .modal-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      resize: vertical;
      font-family: inherit;
      min-height: 80px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-btn-primary {
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
      color: white;
    }

    .modal-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    .modal-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="back-button" onclick="window.location.href='chats.html'">←</div>

    <div class="avatar-section">
      <div class="avatar" id="profileAvatar">
        <span id="avatarEmoji">👤</span>
      </div>
    </div>

    <div class="info-card">
      <div class="info-row">
        <div class="info-label">Имя</div>
        <div class="info-value">
          <span id="profileName">Загрузка...</span>
          <div class="edit-btn" id="editNameBtn">✎</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-label">Телефон</div>
        <div class="info-value" id="profilePhone">+7 (999) 123-45-67</div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-label" style="margin-bottom: 8px;">О себе</div>
      <div class="info-value" id="profileBio" style="cursor:pointer;">Загрузка...</div>
    </div>

    <div class="info-card">
      <div class="info-label" style="margin-bottom: 12px;">Настройки</div>
      <div class="settings-list">
        <div class="settings-item" id="privacySettings">
          <div class="settings-icon">🔒</div>
          <div>Конфиденциальность</div>
        </div>
        <div class="settings-item" id="devicesSettings">
          <div class="settings-icon">📱</div>
          <div>Устройства</div>
        </div>
        <div class="settings-item" id="themeSettings">
          <div class="settings-icon">🎨</div>
          <div>Оформление</div>
        </div>
      </div>
    </div>

    <div class="logout-btn" id="logoutBtn">Выйти из аккаунта</div>
  </div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">Редактировать</div>
      <input type="text" class="modal-input" id="modalInput" style="display:none;">
      <textarea class="modal-textarea" id="modalTextarea" style="display:none;"></textarea>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-secondary" id="modalCancel">Отмена</button>
        <button class="modal-btn modal-btn-primary" id="modalSave">Сохранить</button>
      </div>
    </div>
  </div>

  <input type="file" id="avatarInput" accept="image/*" style="display:none">

  <script>
    // Проверка авторизации
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.href = 'login.html';
    }

    // Загрузка данных профиля
    let userData = JSON.parse(localStorage.getItem('userData') || JSON.stringify({
      name: 'Алексей Смирнов',
      phone: '+7 (999) 123-45-67',
      bio: 'Дизайнер интерфейсов. Люблю минимализм.',
      avatar: '👤'
    }));

    function updateUI() {
      document.getElementById('profileName').textContent = userData.name;
      document.getElementById('profilePhone').textContent = userData.phone;
      document.getElementById('profileBio').textContent = userData.bio;
      
      const avatarEl = document.getElementById('avatarEmoji');
      if (userData.avatar.startsWith('data:image')) {
        avatarEl.innerHTML = `<img src="${userData.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        avatarEl.style.fontSize = '0';
      } else {
        avatarEl.innerHTML = userData.avatar;
        avatarEl.style.fontSize = '48px';
      }
    }

    // Модальное окно
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalInput = document.getElementById('modalInput');
    const modalTextarea = document.getElementById('modalTextarea');
    let currentEditType = '';

    function openModal(type, value) {
      currentEditType = type;
      if (type === 'name') {
        modalTitle.textContent = 'Редактировать имя';
        modalInput.style.display = 'block';
        modalTextarea.style.display = 'none';
        modalInput.value = value;
      } else if (type === 'bio') {
        modalTitle.textContent = 'Редактировать описание';
        modalInput.style.display = 'none';
        modalTextarea.style.display = 'block';
        modalTextarea.value = value;
      }
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    function saveModal() {
      if (currentEditType === 'name') {
        userData.name = modalInput.value.trim() || userData.name;
      } else if (currentEditType === 'bio') {
        userData.bio = modalTextarea.value.trim() || userData.bio;
      }
      localStorage.setItem('userData', JSON.stringify(userData));
      updateUI();
      closeModal();
    }

    // Обработчики
    document.getElementById('editNameBtn').addEventListener('click', () => openModal('name', userData.name));
    document.getElementById('profileBio').addEventListener('click', () => openModal('bio', userData.bio));
    
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalSave').addEventListener('click', saveModal);
    
    // Смена аватара
    document.getElementById('profileAvatar').addEventListener('click', () => {
      const avatarInput = document.getElementById('avatarInput');
      avatarInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            userData.avatar = event.target.result;
            localStorage.setItem('userData', JSON.stringify(userData));
            updateUI();
          };
          reader.readAsDataURL(file);
        }
      };
      avatarInput.click();
    });

    // Настройки (демо)
    document.getElementById('privacySettings').addEventListener('click', () => alert('Настройки конфиденциальности (демо)'));
    document.getElementById('devicesSettings').addEventListener('click', () => alert('Управление устройствами (демо)'));
    document.getElementById('themeSettings').addEventListener('click', () => alert('Настройки оформления (демо)'));

    // Выход
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('isLoggedIn');
      window.location.href = 'login.html';
    });

    updateUI();
  </script>
</body>
</html>
