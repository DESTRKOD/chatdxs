<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Чат — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      height: 64px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .back-button {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      font-size: 24px;
      transition: all 0.2s ease;
    }

    .back-button:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.1);
    }

    .chat-header-center {
      flex: 1;
      text-align: center;
      cursor: pointer;
    }

    .chat-user-name {
      font-size: 17px;
      font-weight: 600;
    }

    .chat-user-status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .chat-user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(91, 124, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      word-wrap: break-word;
      white-space: normal;
      word-break: break-word;
      animation: fadeSlideUp 0.3s ease-out;
    }

    .message-bubble.own {
      align-self: flex-end;
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
    }

    .message-info {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 4px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }

    .chat-input-container {
      padding: 12px 16px 20px;
    }

    .input-wrapper {
      min-height: 48px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 8px 14px;
      gap: 8px;
    }

    .attach-button, .emoji-button {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      flex-shrink: 0;
      font-size: 22px;
      transition: all 0.2s ease;
      border-radius: 8px;
    }

    .attach-button:active, .emoji-button:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.1);
    }

    .message-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 15px;
      outline: none;
      resize: none;
      font-family: inherit;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
    }

    .send-button, .record-button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .send-button {
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
      box-shadow: 0 4px 12px rgba(91, 124, 255, 0.4);
    }

    .record-button {
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
      box-shadow: 0 4px 12px rgba(91, 124, 255, 0.4);
    }

    .send-button:active, .record-button:active {
      transform: scale(0.92);
    }

    .emoji-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 40, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px 24px 0 0;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 12px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      max-height: 300px;
      overflow-y: auto;
    }

    .emoji-panel.active {
      transform: translateY(0);
    }

    .emoji {
      font-size: 32px;
      text-align: center;
      cursor: pointer;
      padding: 8px;
      transition: all 0.1s ease;
      border-radius: 12px;
    }

    .emoji:active {
      transform: scale(1.2);
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="chat-container">
    <div class="chat-header">
      <div class="back-button" onclick="window.location.href='chats.html'">←</div>
      <div class="chat-header-center" id="profileClick">
        <div class="chat-user-name" id="chatUserName">Загрузка...</div>
        <div class="chat-user-status">онлайн</div>
      </div>
      <div class="chat-user-avatar" id="chatUserAvatar">👤</div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="chat-input-container">
      <div class="input-wrapper">
        <div class="attach-button" id="attachBtn">📎</div>
        <div class="emoji-button" id="emojiBtn">😊</div>
        <textarea class="message-input" id="messageInput" placeholder="Сообщение" rows="1"></textarea>
        <div class="record-button" id="recordBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </div>
        <div class="send-button" id="sendBtn" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div id="emojiPanel" class="emoji-panel">
    <div class="emoji">😊</div><div class="emoji">😂</div><div class="emoji">❤️</div><div class="emoji">👍</div><div class="emoji">🔥</div><div class="emoji">🎉</div>
    <div class="emoji">😢</div><div class="emoji">😡</div><div class="emoji">😍</div><div class="emoji">🥰</div><div class="emoji">😎</div><div class="emoji">🤔</div>
    <div class="emoji">🙏</div><div class="emoji">💪</div><div class="emoji">👋</div><div class="emoji">🤝</div><div class="emoji">💡</div><div class="emoji">✨</div>
  </div>

  <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none">

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');
    const userName = decodeURIComponent(urlParams.get('name') || 'Пользователь');
    const userAvatar = decodeURIComponent(urlParams.get('avatar') || '👤');

    // Данные собеседника
    const usersData = {
      user1: { name: "Анна Смирнова", phone: "+7 (999) 123-45-67", bio: "Дизайнер интерфейсов", avatar: "👩" },
      user2: { name: "Дмитрий Петров", phone: "+7 (999) 234-56-78", bio: "Разработчик", avatar: "👨" }
    };

    const currentUserData = usersData[userId] || { name: userName, avatar: userAvatar, bio: "", phone: "" };

    document.getElementById('chatUserName').textContent = currentUserData.name;
    document.getElementById('chatUserAvatar').textContent = currentUserData.avatar;

    // Переход в профиль собеседника (не свой!)
    document.getElementById('profileClick').addEventListener('click', () => {
      window.location.href = `profile.html?view=other&id=${userId}&name=${encodeURIComponent(currentUserData.name)}&avatar=${encodeURIComponent(currentUserData.avatar)}&phone=${encodeURIComponent(currentUserData.phone)}&bio=${encodeURIComponent(currentUserData.bio)}`;
    });

    let messages = JSON.parse(localStorage.getItem(`messages_${userId}`) || '[]');

    function renderMessages() {
      const area = document.getElementById('messagesArea');
      if (messages.length === 0) {
        area.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);">ещё нет сообщений</div>';
        return;
      }
      area.innerHTML = messages.map((msg) => {
        const timeStr = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        const statusIcon = msg.isOwn ? (msg.read ? '✓✓' : '✓') : '';
        return `
          <div class="message-bubble ${msg.isOwn ? 'own' : ''}">
            ${msg.text}
            ${msg.media ? `<img src="${msg.media}" style="max-width:200px;border-radius:12px;margin-top:8px;">` : ''}
            <div class="message-info">
              <span class="message-time">${timeStr}</span>
              ${statusIcon ? `<span class="message-status">${statusIcon}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
      area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;
      
      const newMsg = { text, isOwn: true, time: new Date(), read: false };
      messages.push(newMsg);
      localStorage.setItem(`messages_${userId}`, JSON.stringify(messages));
      renderMessages();
      input.value = '';
      input.style.height = 'auto';
      checkInput();
      
      setTimeout(() => {
        newMsg.read = true;
        localStorage.setItem(`messages_${userId}`, JSON.stringify(messages));
        renderMessages();
      }, 2000);
    }

    function attachMedia() {
      const mediaInput = document.getElementById('mediaInput');
      mediaInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            messages.push({ text: '📎 Медиафайл', media: event.target.result, isOwn: true, time: new Date(), read: false });
            localStorage.setItem(`messages_${userId}`, JSON.stringify(messages));
            renderMessages();
          };
          reader.readAsDataURL(file);
        }
      };
      mediaInput.click();
    }

    function checkInput() {
      const input = document.getElementById('messageInput');
      const recordBtn = document.getElementById('recordBtn');
      const sendBtn = document.getElementById('sendBtn');
      const hasText = input.value.trim().length > 0;
      
      recordBtn.style.display = hasText ? 'none' : 'flex';
      sendBtn.style.display = hasText ? 'flex' : 'none';
      
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    }

    const emojiPanel = document.getElementById('emojiPanel');
    const emojiBtn = document.getElementById('emojiBtn');
    const chatInputContainer = document.querySelector('.chat-input-container');
    
    emojiBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      emojiPanel.classList.toggle('active');
      if (emojiPanel.classList.contains('active')) {
        chatInputContainer.style.transform = 'translateY(-300px)';
      } else {
        chatInputContainer.style.transform = 'translateY(0)';
      }
    });
    
    document.querySelectorAll('.emoji').forEach(emoji => {
      emoji.addEventListener('click', () => {
        const input = document.getElementById('messageInput');
        input.value += emoji.textContent;
        checkInput();
        emojiPanel.classList.remove('active');
        chatInputContainer.style.transform = 'translateY(0)';
        input.focus();
      });
    });
    
    document.addEventListener('click', (e) => {
      if (!emojiBtn.contains(e.target) && !emojiPanel.contains(e.target)) {
        emojiPanel.classList.remove('active');
        chatInputContainer.style.transform = 'translateY(0)';
      }
    });

    document.getElementById('attachBtn').addEventListener('click', attachMedia);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('input', checkInput);
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    let isVideoMode = false;
    document.getElementById('recordBtn').addEventListener('click', () => {
      isVideoMode = !isVideoMode;
      const btn = document.getElementById('recordBtn');
      btn.style.transform = 'scale(0.95)';
      setTimeout(() => btn.style.transform = 'scale(1)', 150);
      if (isVideoMode) {
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="16" height="12" rx="2"/>
          <path d="M22 8l-4 4 4 4V8z"/>
        </svg>`;
      } else {
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>`;
      }
    });

    renderMessages();
  </script>
</body>
</html>
