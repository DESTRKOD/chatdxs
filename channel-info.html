<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>О канале — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    .back-button {
      position: sticky;
      top: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 24px;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .avatar-section {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5B7CFF, #7FA1FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .info-title {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 18px;
      font-weight: 500;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat {
      flex: 1;
      text-align: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .admin-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .admin-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
    }

    .admin-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(91, 124, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="back-button" onclick="history.back()">←</div>

    <div class="avatar-section">
      <div class="avatar" id="channelAvatar">📢</div>
    </div>

    <div class="info-card">
      <div class="info-title">Название</div>
      <div class="info-value" id="channelName">Загрузка...</div>
    </div>

    <div class="info-card">
      <div class="info-title">Описание</div>
      <div class="info-value" id="channelDesc">Загрузка...</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-number" id="subscribers">0</div>
        <div class="stat-label">подписчиков</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="adminsCount">0</div>
        <div class="stat-label">администраторов</div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-title">Администраторы</div>
      <div class="admin-list" id="adminList"></div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const channelId = urlParams.get('id');
    
    const channelData = JSON.parse(localStorage.getItem(`channel_${channelId}`) || JSON.stringify({
      name: 'Канал',
      avatar: '📢',
      subscribers: 156,
      admins: ['Алексей Смирнов'],
      description: 'Официальный канал DxS.'
    }));

    document.getElementById('channelAvatar').textContent = channelData.avatar;
    document.getElementById('channelName').textContent = channelData.name;
    document.getElementById('channelDesc').textContent = channelData.description;
    document.getElementById('subscribers').textContent = channelData.subscribers;
    document.getElementById('adminsCount').textContent = channelData.admins.length;

    const adminList = document.getElementById('adminList');
    adminList.innerHTML = channelData.admins.map(admin => `
      <div class="admin-item">
        <div class="admin-avatar">👤</div>
        <div>${admin}</div>
      </div>
    `).join('');
  </script>
</body>
</html>
