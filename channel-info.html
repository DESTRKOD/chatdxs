<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>О канале — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
    }

    .back-button {
      position: sticky;
      top: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 24px;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .back-button:active {
      transform: scale(0.92);
    }

    .avatar-section {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5B7CFF, #7FA1FF);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeSlideUp 0.4s ease-out;
    }

    .info-title {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 18px;
      font-weight: 500;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat {
      flex: 1;
      text-align: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .admin-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .admin-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
    }

    .admin-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(91, 124, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .edit-channel-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s ease;
    }

    .edit-channel-btn:active {
      transform: scale(0.96);
    }

    /* Модальное окно редактирования канала */
    .edit-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .edit-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .edit-modal-content {
      width: 85%;
      max-width: 340px;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .edit-modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .edit-modal-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
    }

    .edit-modal-input:focus {
      border-color: #5B7CFF;
      box-shadow: 0 0 0 3px rgba(91, 124, 255, 0.2);
    }

    .edit-modal-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      resize: vertical;
      font-family: inherit;
      min-height: 80px;
    }

    .edit-modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .edit-modal-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .edit-modal-btn-primary {
      background: linear-gradient(90deg, #5B7CFF, #7FA1FF);
      color: white;
    }

    .edit-modal-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }

    .edit-modal-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="back-button" onclick="history.back()">←</div>

    <div class="avatar-section">
      <div class="avatar" id="channelAvatar">📢</div>
    </div>

    <div class="info-card">
      <div class="info-title">Название</div>
      <div class="info-value" id="channelName">Загрузка...</div>
    </div>

    <div class="info-card">
      <div class="info-title">Описание</div>
      <div class="info-value" id="channelDesc">Загрузка...</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-number" id="subscribers">0</div>
        <div class="stat-label">подписчиков</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="adminsCount">0</div>
        <div class="stat-label">администраторов</div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-title">Администраторы</div>
      <div class="admin-list" id="adminList"></div>
    </div>

    <button class="edit-channel-btn" id="editChannelBtn">✎ Редактировать канал</button>
  </div>

  <!-- Модальное окно редактирования канала -->
  <div id="editModal" class="edit-modal">
    <div class="edit-modal-content">
      <div class="edit-modal-title">Редактировать канал</div>
      <input type="text" class="edit-modal-input" id="editNameInput" placeholder="Название канала">
      <textarea class="edit-modal-textarea" id="editDescInput" placeholder="Описание канала" rows="3"></textarea>
      <div class="edit-modal-buttons">
        <button class="edit-modal-btn edit-modal-btn-secondary" id="cancelEditBtn">Отмена</button>
        <button class="edit-modal-btn edit-modal-btn-primary" id="saveEditBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const channelId = urlParams.get('id');
    
    // Данные канала
    let channelData = JSON.parse(localStorage.getItem(`channel_data_${channelId}`) || JSON.stringify({
      name: channelId === 'design' ? 'Дизайн-канал' : 'Новости DxS',
      avatar: channelId === 'design' ? '🎨' : '📰',
      subscribers: 156,
      admins: ['Алексей Смирнов', 'Администратор'],
      description: channelId === 'design' 
        ? 'Канал для дизайнеров. Делимся макетами, идеями и вдохновением.' 
        : 'Официальный канал DxS. Новости, обновления и анонсы.'
    }));

    // Проверяем, является ли текущий пользователь админом
    const currentUser = localStorage.getItem('profileName') || 'Алексей Смирнов';
    const isAdmin = channelData.admins.includes(currentUser);

    function updateUI() {
      document.getElementById('channelAvatar').textContent = channelData.avatar;
      document.getElementById('channelName').textContent = channelData.name;
      document.getElementById('channelDesc').textContent = channelData.description;
      document.getElementById('subscribers').textContent = channelData.subscribers;
      document.getElementById('adminsCount').textContent = channelData.admins.length;

      const adminList = document.getElementById('adminList');
      adminList.innerHTML = channelData.admins.map(admin => `
        <div class="admin-item">
          <div class="admin-avatar">👤</div>
          <div>${admin}</div>
        </div>
      `).join('');

      // Если не админ, скрываем кнопку редактирования
      if (!isAdmin) {
        document.getElementById('editChannelBtn').style.display = 'none';
      }
    }

    // Редактирование канала (только для админов)
    const editModal = document.getElementById('editModal');
    
    document.getElementById('editChannelBtn').addEventListener('click', () => {
      document.getElementById('editNameInput').value = channelData.name;
      document.getElementById('editDescInput').value = channelData.description;
      editModal.classList.add('active');
    });
    
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      editModal.classList.remove('active');
    });
    
    document.getElementById('saveEditBtn').addEventListener('click', () => {
      const newName = document.getElementById('editNameInput').value.trim();
      const newDesc = document.getElementById('editDescInput').value.trim();
      
      if (newName) channelData.name = newName;
      if (newDesc) channelData.description = newDesc;
      
      localStorage.setItem(`channel_data_${channelId}`, JSON.stringify(channelData));
      updateUI();
      editModal.classList.remove('active');
    });

    updateUI();
  </script>
</body>
</html>
