<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Регистрация — DxS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(180deg, #1B1F3A 0%, #0F1226 100%);
      overflow: hidden;
      font-family: -apple-system, system-ui, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #FFFFFF;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, #5B7CFF, transparent); top: -150px; right: -100px; }
    .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7FA1FF, transparent); bottom: -150px; right: -120px; opacity: 0.35; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #5B7CFF, transparent); bottom: 20%; left: -150px; opacity: 0.2; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-content {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeSlideUp 0.6s ease-out;
    }

    .title h1 {
      font-size: 36px;
      font-weight: 500;
      line-height: 1.2;
      color: #FFFFFF;
      text-align: center;
      margin-bottom: 30px;
      animation: scaleIn 0.5s ease-out 0.1s both;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 24px;
      animation: fadeSlideUp 0.5s ease-out 0.2s both;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-field {
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      color: #FFFFFF;
      font-size: 16px;
      padding: 0 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: #5B7CFF;
      box-shadow: 0 0 0 3px rgba(91, 124, 255, 0.2);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    .btn-register {
      width: 100%;
      height: 54px;
      background: linear-gradient(90deg, #5B7CFF 0%, #7FA1FF 100%);
      border: none;
      border-radius: 16px;
      color: #FFFFFF;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(91, 124, 255, 0.4);
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-register:active {
      transform: scale(0.96);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
    }

    .login-link a {
      color: #7FA1FF;
      text-decoration: none;
      font-size: 14px;
    }

    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 24px;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .back-button:active {
      transform: scale(0.92);
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="back-button" onclick="history.back()">←</div>

  <div class="auth-container">
    <div class="auth-content">
      <div class="title">
        <h1>Создать аккаунт</h1>
      </div>
      <div class="card">
        <div class="input-group">
          <input type="text" class="input-field" id="nameInput" placeholder="Ваше имя">
        </div>
        <div class="input-group">
          <input type="tel" class="input-field" id="phoneInput" placeholder="Номер телефона">
        </div>
        <div class="input-group">
          <input type="password" class="input-field" id="passwordInput" placeholder="Пароль">
        </div>
        <button class="btn-register" id="registerBtn">Зарегистрироваться</button>
        <div class="login-link">
          <a href="login.html">Уже есть аккаунт? Войти</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerBtn').addEventListener('click', () => {
      const name = document.getElementById('nameInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      if (!name || !phone || !password) {
        alert('Заполните все поля');
        return;
      }

      // Сохраняем данные пользователя
      const userData = {
        name: name,
        phone: phone,
        avatar: '👤'
      };
      localStorage.setItem('userData', JSON.stringify(userData));
      localStorage.setItem('isLoggedIn', 'true');
      
      alert('Регистрация успешна!');
      window.location.href = 'chats.html';
    });
  </script>
</body>
</html>
